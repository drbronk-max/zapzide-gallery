<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OG photo template</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        position: relative;
        overflow: hidden;
        background: #0b0b0c;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .scrim {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.35) 34%,
          rgba(0, 0, 0, 0) 62%
        );
      }
      .meta {
        position: absolute;
        left: 56px;
        bottom: 50px;
        display: flex;
        align-items: center;
        gap: 22px;
        color: #fff;
      }
      /* contain mode: a single portrait image hugged to the right, label beside it */
      body.contain .bg {
        object-fit: contain;
        object-position: right center;
      }
      body.contain .scrim {
        background: linear-gradient(
          to right,
          rgba(11, 11, 12, 0.95) 0%,
          rgba(11, 11, 12, 0.6) 34%,
          rgba(11, 11, 12, 0) 58%
        );
      }
      body.contain .meta {
        left: 64px;
        top: 50%;
        bottom: auto;
        transform: translateY(-50%);
      }
      .glyph {
        width: 76px;
        height: 76px;
        flex: 0 0 auto;
        background: rgba(20, 20, 22, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .glyph svg {
        width: 40px;
        height: 40px;
      }
      .label {
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 1px;
      }
      .tagline {
        font-size: 28px;
        color: rgba(255, 255, 255, 0.78);
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <img class="bg" id="bg" />
    <div class="scrim"></div>
    <div class="meta">
      <div class="glyph" id="glyph"></div>
      <div>
        <div class="label" id="label"></div>
        <div class="tagline" id="tagline"></div>
      </div>
    </div>
    <script>
      const GLYPHS = {
        sun: {
          vb: "0 0 512 512",
          color: "#f5c518",
          d: "M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z",
        },
        moon: {
          vb: "0 0 384 512",
          color: "#cbd5e1",
          d: "M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z",
        },
        image: {
          vb: "0 0 512 512",
          color: "#9aa0a6",
          d: "M0 96C0 60.7 28.7 32 64 32l384 0c35.3 0 64 28.7 64 64l0 320c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64L0 96zM323.8 202.5c-4.5-6.6-11.9-10.5-19.8-10.5s-15.4 3.9-19.8 10.5l-87 127.6L170.7 297c-4.6-5.7-11.5-9-18.7-9s-14.2 3.3-18.7 9l-64 80c-5.8 7.2-6.9 17.1-2.9 25.4s12.4 13.6 21.6 13.6l96 0 32 0 208 0c8.9 0 17.1-4.9 21.2-12.8s3.6-17.4-1.4-24.7l-120-176zM112 192a48 48 0 1 0 0-96 48 48 0 1 0 0 96z",
        },
      };
      const p = new URLSearchParams(location.search);
      if ((p.get("fit") || "cover") === "contain") document.body.classList.add("contain");
      document.getElementById("bg").src = p.get("bg") || "";
      const g = GLYPHS[p.get("glyph") || "image"];
      document.getElementById("glyph").innerHTML =
        '<svg viewBox="' + g.vb + '"><path fill="' + g.color + '" d="' + g.d + '"/></svg>';
      document.getElementById("label").textContent = p.get("label") || "";
      document.getElementById("tagline").textContent = p.get("tagline") || "";
    </script>
  </body>
</html>
